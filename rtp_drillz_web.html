<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTP Drillz</title>
  <style>
    :root {
      --bg-dark: #1a1a1a;
      --bg-darker: #0f0f0f;
      --felt: #004d00;
      --text: #e0e0e0;
      --white: #ffffff;
      --orange: #c85f00;
      --orange-hover: #d66d12;
      --danger: #ff3300;
      --panel: #232323;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 500px at 50% -10%, #2b2b2b 0%, var(--bg-dark) 45%, var(--bg-darker) 100%);
    }

    .app {
      width: min(1200px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: clamp(30px, 4.8vw, 52px);
      color: var(--orange);
      letter-spacing: 1px;
      font-weight: 800;
    }

    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      background: #202020;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .timer-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timer-wrap label {
      font-weight: 700;
      color: var(--text);
      font-size: 14px;
    }

    .layout-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #202020;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .layout-wrap label {
      font-weight: 700;
      color: var(--text);
      font-size: 14px;
    }

    .mode-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #202020;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .mode-wrap label {
      font-weight: 700;
      color: var(--text);
      font-size: 14px;
    }

    .timer-pause-btn {
      width: 100%;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 8px;
      border: 1px solid #3a3a3a;
      background: #2b2b2b;
      color: var(--white);
      cursor: pointer;
      transition: background 120ms ease;
    }

    .timer-pause-btn:hover {
      background: #3a3a3a;
      transform: none;
    }

    .timer-pause-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    select {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: var(--white);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }

    select:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 2px rgba(200, 95, 0, 0.22);
    }

    .table {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      border: 2px solid var(--orange);
      border-radius: 16px;
      padding: 24px 14px 14px;
      background:
        radial-gradient(120% 100% at 50% 20%, #0b6b0b 0%, var(--felt) 45%, #003200 100%);
      overflow: hidden;
      transition: background 120ms ease;
    }

    .table.flash {
      background: var(--danger);
    }

    .manual-panel {
      display: none;
      border: 1px solid #343434;
      border-radius: 12px;
      background: #1f1f1f;
      padding: 10px 12px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .manual-panel.show {
      display: flex;
    }

    .manual-panel-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .manual-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 0.2px;
    }

    .manual-summary {
      font-size: 13px;
      color: #d3d3d3;
      opacity: 0.95;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .input-hand-btn {
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 800;
      border: 1px solid #4a4a4a;
      border-radius: 9px;
      background: #2c2c2c;
      color: var(--white);
      cursor: pointer;
    }

    .input-hand-btn:hover {
      background: #3a3a3a;
      transform: none;
    }

    .builder-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      padding: 18px;
    }

    .builder-modal.show {
      display: flex;
    }

    .builder-dialog {
      width: min(1120px, 100%);
      max-height: calc(100vh - 36px);
      overflow: auto;
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      background: #191919;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .builder-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .builder-title {
      margin: 0;
      font-size: 19px;
      font-weight: 800;
      color: var(--white);
    }

    .builder-close-btn {
      border: 1px solid #4a4a4a;
      border-radius: 8px;
      padding: 8px 10px;
      background: #282828;
      color: var(--white);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .builder-close-btn:hover {
      background: #363636;
      transform: none;
    }

    .builder-slots {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .builder-slot {
      border: 1px solid #4a4a4a;
      border-radius: 10px;
      background: #232323;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .builder-slot:hover {
      background: #2b2b2b;
      transform: none;
    }

    .builder-slot.active {
      border-color: var(--orange);
      box-shadow: 0 0 0 1px rgba(200, 95, 0, 0.35) inset;
      background: #2a2118;
    }

    .builder-slot-label {
      font-size: 12px;
      font-weight: 800;
      color: #d7d7d7;
      letter-spacing: 0.2px;
    }

    .builder-slot-card {
      width: 78px;
      height: 112px;
      border-radius: 8px;
      border: 2px dashed #555;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9e9e9e;
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      text-transform: uppercase;
    }

    .builder-slot-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    .builder-slot-card.filled {
      border-style: solid;
      border-color: #be6820;
      background: #fff;
    }

    .builder-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .builder-actions button {
      font-size: 13px;
      font-weight: 700;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid #4b4b4b;
      background: #2c2c2c;
      color: var(--white);
      cursor: pointer;
    }

    .builder-actions button:hover {
      background: #3a3a3a;
      transform: none;
    }

    .builder-actions button.primary {
      background: var(--orange);
      color: #151515;
      border-color: #c06a20;
    }

    .builder-actions button.primary:hover {
      background: var(--orange-hover);
    }

    .builder-grid {
      display: grid;
      grid-template-columns: repeat(13, minmax(0, 1fr));
      gap: 7px;
    }

    .builder-card-btn {
      border: 1px solid #4a4a4a;
      border-radius: 8px;
      padding: 2px;
      background: #242424;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 88px;
      overflow: hidden;
    }

    .builder-card-btn:hover {
      background: #323232;
      transform: none;
    }

    .builder-card-btn img {
      width: 100%;
      max-width: 70px;
      height: auto;
      display: block;
      border-radius: 5px;
      background: #fff;
    }

    .builder-card-fallback {
      width: 100%;
      max-width: 70px;
      height: 96px;
      border-radius: 5px;
      background: #fff;
      color: #111;
      font-size: 20px;
      font-weight: 800;
      display: none;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
    }

    .builder-card-btn.selected {
      border-color: var(--orange);
      background: #4d2c10;
    }

    .builder-card-btn.active-selected {
      box-shadow: 0 0 0 2px rgba(200, 95, 0, 0.6) inset;
    }

    .countdown {
      position: absolute;
      top: 12px;
      right: 14px;
      color: var(--white);
      font-size: clamp(20px, 3vw, 34px);
      font-weight: 800;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
    }

    .table-config {
      position: absolute;
      z-index: 4;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.28);
      padding: 8px;
      backdrop-filter: blur(2px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
    }

    .table-config-left {
      top: 10px;
      left: 12px;
      width: 196px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .table-config-right {
      top: 62px;
      right: 12px;
      width: 172px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .stack-title {
      color: var(--white);
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.2px;
      line-height: 1.1;
    }

    .config-row {
      display: grid;
      gap: 6px;
    }

    .config-row.row-three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .config-row.row-two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .stack-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .config-btn {
      border: 1px solid #4a4a4a;
      border-radius: 8px;
      padding: 7px 4px;
      font-size: 12px;
      font-weight: 800;
      color: var(--white);
      background: rgba(33, 33, 33, 0.9);
      line-height: 1.1;
      letter-spacing: 0.2px;
      text-align: center;
    }

    .config-btn:hover {
      background: rgba(49, 49, 49, 0.95);
      transform: none;
    }

    .config-btn.active {
      border-color: var(--orange);
      background: #5b2f00;
      color: #fff4e7;
      box-shadow: 0 0 0 1px rgba(200, 95, 0, 0.3) inset;
    }

    .time-overlay {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: clamp(56px, 11vw, 140px);
      font-weight: 900;
      color: var(--orange);
      background: rgba(0, 0, 0, 0.25);
      text-shadow: 0 0 20px rgba(255, 149, 0, 0.45);
      letter-spacing: 2px;
      z-index: 6;
      pointer-events: none;
    }

    .time-overlay.show {
      display: flex;
      animation: pulse 0.5s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    .start-splash {
      margin: 0;
      font-size: clamp(56px, 9vw, 128px);
      color: var(--orange);
      font-weight: 900;
      letter-spacing: 2px;
      user-select: none;
      pointer-events: none;
      text-align: center;
      transform: translateY(10px);
    }

    .board-title {
      margin: 8px 0 0;
      font-size: clamp(24px, 3.5vw, 38px);
      color: var(--white);
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .status {
      min-height: 24px;
      margin: 8px 0 0;
      font-size: clamp(16px, 2.2vw, 22px);
      color: var(--text);
      text-align: center;
      font-weight: 500;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.25);
    }

    .cards {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 162px;
      padding: 4px 6px;
    }

    .hero-wrap {
      border-radius: 14px;
      background: linear-gradient(180deg, #242424 0%, #181818 100%);
      border: 1px solid #333;
      padding: 14px 16px 16px;
    }

    .hero-layout {
      display: flex;
      gap: 14px;
      align-items: stretch;
      justify-content: center;
      flex-wrap: wrap;
    }

    .cam-panel {
      width: min(340px, 100%);
      min-width: 280px;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      background: #1f1f1f;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cam-title {
      color: var(--white);
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.2px;
    }

    .cam-video-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      border: 2px solid var(--orange);
      border-radius: 10px;
      overflow: hidden;
      background: #101010;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cam-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #101010;
    }

    .cam-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px;
      color: #d7d7d7;
      background: rgba(0, 0, 0, 0.45);
      font-size: 13px;
      line-height: 1.35;
    }

    .rec-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #191919;
      border: 1px solid #313131;
      border-radius: 8px;
      padding: 8px 9px;
      min-height: 38px;
    }

    .rec-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #666;
      flex: 0 0 11px;
    }

    .rec-dot.recording {
      background: #ff3b30;
      animation: recPulse 1s infinite;
    }

    .rec-dot.paused {
      background: #f5a623;
      animation: none;
    }

    .rec-dot.idle {
      background: #666;
    }

    @keyframes recPulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }

    .rec-state-text {
      flex: 1;
      font-size: 12px;
      color: #f0f0f0;
      font-weight: 700;
    }

    .rec-elapsed {
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      color: #ffe6cc;
      font-weight: 700;
    }

    .rec-hint {
      font-size: 12px;
      color: #cfcfcf;
      line-height: 1.32;
      min-height: 30px;
    }

    .rec-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .rec-controls button {
      font-size: 12px;
      font-weight: 700;
      padding: 8px 11px;
      border-radius: 8px;
      min-width: 70px;
    }

    .rec-controls button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .playback-wrap {
      display: none;
      margin-top: 2px;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      background: #101010;
      padding: 8px;
    }

    .playback-wrap.show {
      display: block;
    }

    .playback-video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      display: block;
    }

    .hero-hand-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 300px;
    }

    .hero-title {
      margin: 2px 0 10px;
      text-align: center;
      color: var(--white);
      font-size: clamp(22px, 3.2vw, 34px);
      font-weight: 800;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 60px;
      margin-top: 6px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      background: #2b2b2b;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
    }

    button:hover {
      background: #3a3a3a;
      transform: translateY(-1px);
    }

    button.primary {
      color: #151515;
      background: var(--orange);
      font-size: 18px;
      padding: 14px 24px;
    }

    button.primary:hover {
      background: var(--orange-hover);
    }

    .card-shell {
      background: var(--orange);
      border-radius: 8px;
      padding: 2px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
    }

    .card {
      display: block;
      height: 145px;
      width: auto;
      background: #fff;
      border-radius: 6px;
    }

    .card-fallback {
      display: none;
      width: 102px;
      height: 145px;
      border-radius: 6px;
      background: #fff;
      color: #111;
      font-weight: 800;
      font-size: 28px;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      user-select: none;
    }

    .empty-board {
      font-size: 16px;
      opacity: 0.95;
    }

    body.layout-compact .app {
      padding: 12px 14px 14px;
      gap: 8px;
    }

    body.layout-compact .topbar {
      gap: 8px;
    }

    body.layout-compact .manual-panel {
      padding: 8px 10px;
      gap: 8px;
    }

    body.layout-compact .manual-title {
      font-size: 15px;
    }

    body.layout-compact .manual-summary {
      font-size: 12px;
    }

    body.layout-compact .builder-dialog {
      padding: 10px;
      gap: 10px;
    }

    body.layout-compact .builder-slots {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    body.layout-compact .builder-slot-card {
      width: 66px;
      height: 95px;
    }

    body.layout-compact .builder-grid {
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 5px;
    }

    body.layout-compact .builder-card-btn {
      min-height: 74px;
    }

    body.layout-compact .builder-card-btn img,
    body.layout-compact .builder-card-fallback {
      max-width: 58px;
    }

    body.layout-compact .title {
      font-size: clamp(26px, 3.9vw, 42px);
    }

    body.layout-compact .table {
      padding: 16px 10px 10px;
      min-height: 330px;
    }

    body.layout-compact .countdown {
      font-size: clamp(18px, 2.4vw, 28px);
    }

    body.layout-compact .table-config {
      padding: 6px;
    }

    body.layout-compact .table-config-left {
      width: 170px;
      top: 8px;
      left: 8px;
      gap: 5px;
    }

    body.layout-compact .table-config-right {
      width: 154px;
      top: 50px;
      right: 8px;
    }

    body.layout-compact .config-btn {
      font-size: 11px;
      padding: 6px 3px;
    }

    body.layout-compact .stack-title {
      font-size: 12px;
    }

    body.layout-compact .board-title {
      font-size: clamp(20px, 3vw, 30px);
      margin-top: 4px;
    }

    body.layout-compact .status {
      font-size: clamp(14px, 1.8vw, 18px);
      min-height: 20px;
      margin-top: 4px;
    }

    body.layout-compact .cards {
      gap: 8px;
      min-height: 132px;
      padding: 2px 4px;
    }

    body.layout-compact .hero-wrap {
      padding: 10px 12px 12px;
    }

    body.layout-compact .hero-layout {
      gap: 10px;
      align-items: flex-start;
    }

    body.layout-compact .cam-panel {
      width: min(290px, 100%);
      min-width: 220px;
      padding: 8px;
      gap: 6px;
      position: sticky;
      top: 8px;
      align-self: flex-start;
    }

    body.layout-compact .cam-video-shell {
      aspect-ratio: 4 / 3;
    }

    body.layout-compact .rec-hint {
      min-height: 0;
      display: none;
    }

    body.layout-compact .rec-controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    body.layout-compact .rec-controls button {
      width: 100%;
      min-width: 0;
      font-size: 11px;
      padding: 7px 6px;
    }

    body.layout-compact .playback-wrap.show {
      max-height: 170px;
      overflow: auto;
    }

    body.layout-compact .playback-video {
      max-height: 140px;
      object-fit: contain;
    }

    body.layout-compact .card {
      height: 120px;
    }

    body.layout-compact .card-fallback {
      height: 120px;
      width: 84px;
      font-size: 22px;
    }

    @media (max-width: 900px) {
      .app {
        padding: 14px 12px 16px;
      }

      .manual-panel {
        flex-direction: column;
        align-items: flex-start;
      }

      .manual-summary {
        white-space: normal;
      }

      .builder-slots {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .builder-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .table {
        padding: 20px 10px 12px;
      }

      .table-config {
        position: static;
        width: 100%;
        max-width: 360px;
      }

      .table-config-left,
      .table-config-right {
        width: 100%;
      }

      .table-config-right {
        margin-top: 6px;
      }

      .hero-layout {
        flex-direction: column;
      }

      .cam-panel,
      .hero-hand-panel {
        width: 100%;
        min-width: 0;
      }

      body.layout-compact .cam-panel {
        position: static;
      }

      .card {
        height: 126px;
      }

      .card-fallback {
        height: 126px;
        width: 89px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="title">RTP Drillz</h1>
      <div class="timer-wrap">
        <div class="timer-row">
          <label for="timerSelect">Timer / street</label>
          <select id="timerSelect">
            <option>None</option>
            <option>10s</option>
            <option>15s</option>
            <option>30s</option>
            <option>45s</option>
            <option>60s</option>
            <option>90s</option>
          </select>
        </div>
        <button id="timerPauseBtn" class="timer-pause-btn" type="button" disabled>Pause Timer</button>
      </div>
      <div class="layout-wrap">
        <label for="layoutSelect">Layout</label>
        <select id="layoutSelect">
          <option value="standard">Standard</option>
          <option value="compact">Compact</option>
        </select>
      </div>
      <div class="mode-wrap">
        <label for="modeSelect">Mode</label>
        <select id="modeSelect">
          <option value="live">Live Drill</option>
          <option value="replay">Hand Replay</option>
        </select>
      </div>
    </header>

    <section id="manualPanel" class="manual-panel">
      <div class="manual-panel-left">
        <div class="manual-title">Hand Replay Setup</div>
        <div id="manualSummary" class="manual-summary">No hand loaded yet.</div>
      </div>
      <button id="inputHandBtn" class="input-hand-btn" type="button">Input Hand</button>
    </section>

    <section id="table" class="table">
      <div id="countdown" class="countdown">Time left: --:--</div>
      <div id="timeOverlay" class="time-overlay">TIME!</div>
      <div class="table-config table-config-left">
        <div class="config-row row-three">
          <button class="config-btn" type="button" data-config-group="spotType" data-config-value="SRP">SRP</button>
          <button class="config-btn" type="button" data-config-group="spotType" data-config-value="3BP">3BP</button>
          <button class="config-btn" type="button" data-config-group="spotType" data-config-value="4BP">4BP</button>
        </div>
        <div class="config-row row-two">
          <button class="config-btn" type="button" data-config-group="position" data-config-value="IP">IP</button>
          <button class="config-btn" type="button" data-config-group="position" data-config-value="OOP">OOP</button>
        </div>
        <div class="config-row row-two">
          <button class="config-btn" type="button" data-config-group="role" data-config-value="PFR">PFR</button>
          <button class="config-btn" type="button" data-config-group="role" data-config-value="PFC">PFC</button>
        </div>
      </div>
      <div class="table-config table-config-right">
        <div class="stack-title">Effective Stacks</div>
        <div class="stack-grid">
          <button class="config-btn" type="button" data-config-group="stacks" data-config-value="50BB">50BB</button>
          <button class="config-btn" type="button" data-config-group="stacks" data-config-value="100BB">100BB</button>
          <button class="config-btn" type="button" data-config-group="stacks" data-config-value="150BB">150BB</button>
          <button class="config-btn" type="button" data-config-group="stacks" data-config-value="200BB">200BB</button>
          <button class="config-btn" type="button" data-config-group="stacks" data-config-value="300BB">300BB</button>
          <button class="config-btn" type="button" data-config-group="stacks" data-config-value="500BB+">500BB+</button>
        </div>
      </div>
      <h2 id="startSplash" class="start-splash">RTP Drillz</h2>

      <h3 class="board-title">Board</h3>
      <div id="boardCards" class="cards"></div>
      <p id="status" class="status">&nbsp;</p>
    </section>

    <section class="hero-wrap">
      <div class="hero-layout">
        <aside class="cam-panel">
          <div class="cam-title">Think Out Loud Capture</div>
          <div class="cam-video-shell">
            <video id="webcamPreview" class="cam-video" autoplay muted playsinline></video>
            <div id="webcamPlaceholder" class="cam-placeholder">Camera preview unavailable</div>
          </div>

          <div class="rec-status-row">
            <div id="recDot" class="rec-dot idle"></div>
            <div id="recStateText" class="rec-state-text">Recorder idle</div>
            <div id="recElapsed" class="rec-elapsed">00:00</div>
          </div>

          <div id="recHint" class="rec-hint">
            Recording auto-starts on first flop. Share this browser tab for full drill capture.
          </div>

          <div class="rec-controls">
            <button id="recStartBtn" type="button">Start</button>
            <button id="recPauseBtn" type="button" disabled>Pause</button>
            <button id="recResumeBtn" type="button" disabled>Resume</button>
            <button id="recStopBtn" type="button" disabled>Stop</button>
            <button id="recPlaybackBtn" type="button" disabled>Playback</button>

          <div id="playbackWrap" class="playback-wrap">

        <div class="hero-hand-panel">

          <nav id="controls" class="controls"></nav>
        </div>

  </main>

  <div id="handBuilderModal" class="builder-modal" aria-hidden="true">
    <div class="builder-dialog">
      <div class="builder-top">
        <h3 class="builder-title">Input Hand</h3>
        <button id="builderCloseBtn" class="builder-close-btn" type="button">Close</button>
      </div>

      <div id="builderSlots" class="builder-slots">
        <button type="button" class="builder-slot" data-builder-slot="hand1">
          <span class="builder-slot-label">Hero 1</span>
          <div class="builder-slot-card"></div>
        </button>
        <button type="button" class="builder-slot" data-builder-slot="hand2">
          <span class="builder-slot-label">Hero 2</span>
          <div class="builder-slot-card"></div>
        </button>
        <button type="button" class="builder-slot" data-builder-slot="flop1">
          <span class="builder-slot-label">Flop 1</span>
          <div class="builder-slot-card"></div>
        </button>
        <button type="button" class="builder-slot" data-builder-slot="flop2">
          <span class="builder-slot-label">Flop 2</span>
          <div class="builder-slot-card"></div>
        </button>
        <button type="button" class="builder-slot" data-builder-slot="flop3">
          <span class="builder-slot-label">Flop 3</span>
          <div class="builder-slot-card"></div>
        </button>
        <button type="button" class="builder-slot" data-builder-slot="turn">
          <span class="builder-slot-label">Turn</span>
          <div class="builder-slot-card"></div>
        </button>
        <button type="button" class="builder-slot" data-builder-slot="river">
          <span class="builder-slot-label">River</span>
          <div class="builder-slot-card"></div>
        </button>
      </div>

      <div class="builder-actions">
        <button id="builderClearSlotBtn" type="button">Clear Slot</button>
        <button id="builderClearAllBtn" type="button">Clear All</button>
        <button id="builderAutoFillBtn" type="button">Auto-Fill Missing</button>
        <button id="builderApplyBtn" type="button" class="primary">Apply</button>
      </div>

      <div id="builderDeckGrid" class="builder-grid"></div>
    </div>
  </div>

  <script>
    "use strict";

    const RANKS = "23456789TJQKA".split("");
    const SUITS = "shdc".split("");
    const TIMER_KEY = "rtpDrillzTimerChoice";
    const LAYOUT_KEY = "rtpDrillzLayoutMode";
    const MODE_KEY = "rtpDrillzModeChoice";
    const TIMER_MAP = {
      None: 0,
      "10s": 10,
      "15s": 15,
      "30s": 30,
      "45s": 45,
      "60s": 60,
      "90s": 90
    };
    const MAX_RECORDING_MS = 10 * 60 * 1000;

    const CARD_PREFIXES = [
      "",
      "cards/",
      "png-card-1.3/",
      "PNG-card-1.3/",
      "PNG-cards-1.3/",
      "deck/",
      "images/",
      "img/"
    ];
    const RANK_WORD = {
      A: "ace",
      K: "king",
      Q: "queen",
      J: "jack",
      T: "10",
      "9": "9",
      "8": "8",
      "7": "7",
      "6": "6",
      "5": "5",
      "4": "4",
      "3": "3",
      "2": "2"
    };
    const RANK_NAME = {
      A: "Ace",
      K: "King",
      Q: "Queen",
      J: "Jack",
      T: "Ten",
      "9": "Nine",
      "8": "Eight",
      "7": "Seven",
      "6": "Six",
      "5": "Five",
      "4": "Four",
      "3": "Three",
      "2": "Two"
    };
    const SUIT_WORD = {
      s: "spades",
      h: "hearts",
      d: "diamonds",
      c: "clubs"
    };
    const SUIT_NAME = {
      s: "Spades",
      h: "Hearts",
      d: "Diamonds",
      c: "Clubs"
    };
    const EMBEDDED_CARDS =
      window.__RTP_EMBEDDED_CARDS__ && typeof window.__RTP_EMBEDDED_CARDS__ === "object"
        ? window.__RTP_EMBEDDED_CARDS__
        : {};
    const GENERATED_BACK_DATA_URI = buildGeneratedBackDataUri();

    const state = {
      stage: "start",
      mode: "live",
      hand: [],
      board: [],
      deck: [],
      manual: {
        hand1: "",
        hand2: "",
        flop1: "",
        flop2: "",
        flop3: "",
        turn: "",
        river: ""
      },
      config: {
        spotType: "",
        position: "",
        role: "",
        stacks: ""
      },
      timerChoice: "None",
      layoutMode: "standard",
      timeLeft: 0,
      timerId: null,
      timerPausedByUser: false,
      flashId: null
    };
    let audioContext = null;
    let timerPausedByRecording = false;
    const recording = {
      mode: "idle", // idle, recording, paused, stopping
      autoStartArmed: true,
      mediaRecorder: null,
      displayStream: null,
      micStream: null,
      chunks: [],
      blob: null,
      blobUrl: "",
      mimeType: "video/webm",
      elapsedMs: 0,
      elapsedIntervalId: null,
      stopReason: "manual"
    };
    const handBuilderState = {
      open: false,
      activeField: "hand1",
      draft: {},
      deckButtons: {}
    };

    const els = {
      timerSelect: document.getElementById("timerSelect"),
      timerPauseBtn: document.getElementById("timerPauseBtn"),
      layoutSelect: document.getElementById("layoutSelect"),
      modeSelect: document.getElementById("modeSelect"),
      manualPanel: document.getElementById("manualPanel"),
      inputHandBtn: document.getElementById("inputHandBtn"),
      manualSummary: document.getElementById("manualSummary"),
      handBuilderModal: document.getElementById("handBuilderModal"),
      builderSlots: Array.from(document.querySelectorAll("[data-builder-slot]")),
      builderDeckGrid: document.getElementById("builderDeckGrid"),
      builderCloseBtn: document.getElementById("builderCloseBtn"),
      builderClearSlotBtn: document.getElementById("builderClearSlotBtn"),
      builderClearAllBtn: document.getElementById("builderClearAllBtn"),
      builderAutoFillBtn: document.getElementById("builderAutoFillBtn"),
      builderApplyBtn: document.getElementById("builderApplyBtn"),
      table: document.getElementById("table"),
      countdown: document.getElementById("countdown"),
      timeOverlay: document.getElementById("timeOverlay"),
      startSplash: document.getElementById("startSplash"),
      boardCards: document.getElementById("boardCards"),
      handCards: document.getElementById("handCards"),
      controls: document.getElementById("controls"),
      status: document.getElementById("status"),
      configButtons: Array.from(document.querySelectorAll("[data-config-group]")),
      webcamPreview: document.getElementById("webcamPreview"),
      webcamPlaceholder: document.getElementById("webcamPlaceholder"),
      recDot: document.getElementById("recDot"),
      recStateText: document.getElementById("recStateText"),
      recElapsed: document.getElementById("recElapsed"),
      recHint: document.getElementById("recHint"),
      recStartBtn: document.getElementById("recStartBtn"),
      recPauseBtn: document.getElementById("recPauseBtn"),
      recResumeBtn: document.getElementById("recResumeBtn"),
      recStopBtn: document.getElementById("recStopBtn"),
      recPlaybackBtn: document.getElementById("recPlaybackBtn"),
      recDownloadBtn: document.getElementById("recDownloadBtn"),
      playbackWrap: document.getElementById("playbackWrap"),
      reviewPlayback: document.getElementById("reviewPlayback")
    };

    function init() {
      const savedTimer = localStorage.getItem(TIMER_KEY);
      if (savedTimer && Object.prototype.hasOwnProperty.call(TIMER_MAP, savedTimer)) {
        state.timerChoice = savedTimer;
      }
      const savedLayout = localStorage.getItem(LAYOUT_KEY);
      if (savedLayout === "compact" || savedLayout === "standard") {
        state.layoutMode = savedLayout;
      } else if (window.innerHeight < 900) {
        state.layoutMode = "compact";
      }
      const savedMode = localStorage.getItem(MODE_KEY);
      if (savedMode === "live" || savedMode === "replay") {
        state.mode = savedMode;
      }
      els.timerSelect.value = state.timerChoice;
      els.layoutSelect.value = state.layoutMode;
      els.modeSelect.value = state.mode;
      applyLayoutMode(state.layoutMode);
      updateManualPanelVisibility();

      els.timerSelect.addEventListener("change", () => {
        ensureAudioContext();
        state.timerChoice = els.timerSelect.value;
        localStorage.setItem(TIMER_KEY, state.timerChoice);

        if (["flop", "turn", "river"].includes(state.stage)) {
          startTimerForStreet();
        } else if (state.timerChoice === "None") {
          setCountdownIdle();
        }
        updateTimerPauseButton();
      });
      els.timerPauseBtn.addEventListener("click", toggleTimerPause);
      els.layoutSelect.addEventListener("change", () => {
        const mode = els.layoutSelect.value === "compact" ? "compact" : "standard";
        state.layoutMode = mode;
        localStorage.setItem(LAYOUT_KEY, mode);
        applyLayoutMode(mode);
      });
      els.modeSelect.addEventListener("change", () => {
        state.mode = els.modeSelect.value === "replay" ? "replay" : "live";
        localStorage.setItem(MODE_KEY, state.mode);
        updateManualPanelVisibility();
        refreshScene();
      });

      els.recStartBtn.addEventListener("click", () => {
        ensureAudioContext();
        void startRecording({ auto: false });
      });
      els.recPauseBtn.addEventListener("click", pauseRecording);
      els.recResumeBtn.addEventListener("click", resumeRecording);
      els.recStopBtn.addEventListener("click", () => stopRecording({ reason: "manual" }));
      els.recPlaybackBtn.addEventListener("click", togglePlayback);
      els.recDownloadBtn.addEventListener("click", downloadRecording);
      els.inputHandBtn.addEventListener("click", openHandBuilder);

      void initWebcamPreview();
      initManualBuilder();
      bindConfigControls();
      renderConfigSelections();
      updateRecordingUi();
      refreshScene();
    }

    function updateManualPanelVisibility() {
      const show = state.mode === "replay";
      els.manualPanel.classList.toggle("show", show);
      if (!show && handBuilderState.open) {
        closeHandBuilder(false);
      }
    }

    function manualFieldOrder() {
      return ["hand1", "hand2", "flop1", "flop2", "flop3", "turn", "river"];
    }

    function cloneManualValues(source) {
      const out = {};
      manualFieldOrder().forEach((field) => {
        out[field] = source[field] || "";
      });
      return out;
    }

    function firstEmptyManualField(values) {
      return manualFieldOrder().find((field) => !values[field]) || "hand1";
    }

    function manualCardDisplay(card) {
      return card ? formatCard(card) : "--";
    }

    function cardPrettyName(code) {
      if (!code || code.length < 2) return "that card";
      const rank = code[0].toUpperCase();
      const suit = code[1].toLowerCase();
      return `${RANK_NAME[rank] || rank} of ${SUIT_NAME[suit] || suit}`;
    }

    function showDuplicateCardWarning(cardCode) {
      const cardName = cardPrettyName(cardCode);
      window.alert(
        `Deck should not have two ${cardName} unless you're playing against magicians... and you should not play against magicians.`
      );
    }

    function renderManualSummary() {
      const hero = `${manualCardDisplay(state.manual.hand1)} ${manualCardDisplay(state.manual.hand2)}`;
      const flop = `${manualCardDisplay(state.manual.flop1)} ${manualCardDisplay(state.manual.flop2)} ${manualCardDisplay(state.manual.flop3)}`;
      const turn = manualCardDisplay(state.manual.turn);
      const river = manualCardDisplay(state.manual.river);
      els.manualSummary.textContent = `Hero: ${hero} | Flop: ${flop} | Turn: ${turn} | River: ${river}`;
    }

    function createBuilderDeckButton(card) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "builder-card-btn";
      btn.dataset.card = card;
      btn.title = cardPrettyName(card);

      const img = document.createElement("img");
      img.alt = `Card ${formatCard(card)}`;

      const fallback = document.createElement("div");
      fallback.className = "builder-card-fallback";
      fallback.textContent = formatCard(card);

      btn.appendChild(img);
      btn.appendChild(fallback);

      const key = formatCard(card);
      if (EMBEDDED_CARDS[key]) {
        img.src = EMBEDDED_CARDS[key];
        fallback.style.display = "none";
      } else {
        attachImageWithFallback(img, fallback, cardImageCandidates(card));
      }

      btn.addEventListener("click", () => {
        pickBuilderCard(card);
      });

      return btn;
    }

    function createBuilderSlotFace(card, slotBody) {
      slotBody.innerHTML = "";
      slotBody.classList.toggle("filled", Boolean(card));
      if (!card) {
        slotBody.textContent = "--";
        return;
      }

      const img = document.createElement("img");
      img.alt = `Card ${formatCard(card)}`;

      const fallback = document.createElement("div");
      fallback.className = "builder-card-fallback";
      fallback.textContent = formatCard(card);

      slotBody.appendChild(img);
      slotBody.appendChild(fallback);

      const key = formatCard(card);
      if (EMBEDDED_CARDS[key]) {
        img.src = EMBEDDED_CARDS[key];
        fallback.style.display = "none";
      } else {
        attachImageWithFallback(img, fallback, cardImageCandidates(card));
      }
    }

    function renderBuilderDeckSelection() {
      const selectedCards = new Set(
        manualFieldOrder().map((field) => handBuilderState.draft[field]).filter(Boolean)
      );
      const activeCard = handBuilderState.draft[handBuilderState.activeField];
      buildFullDeck().forEach((card) => {
        const btn = handBuilderState.deckButtons[card];
        if (!btn) return;
        btn.classList.toggle("selected", selectedCards.has(card));
        btn.classList.toggle("active-selected", Boolean(activeCard && activeCard === card));
      });
    }

    function renderBuilderSlots() {
      els.builderSlots.forEach((slotBtn) => {
        const field = slotBtn.dataset.builderSlot;
        if (!field) return;
        slotBtn.classList.toggle("active", field === handBuilderState.activeField);
        const slotBody = slotBtn.querySelector(".builder-slot-card");
        createBuilderSlotFace(handBuilderState.draft[field] || "", slotBody);
      });
      renderBuilderDeckSelection();
    }

    function setBuilderActiveField(field) {
      if (!manualFieldOrder().includes(field)) return;
      handBuilderState.activeField = field;
      renderBuilderSlots();
    }

    function nextBuilderField(currentField) {
      const order = manualFieldOrder();
      const idx = order.indexOf(currentField);
      if (idx < 0 || idx >= order.length - 1) return currentField;
      return order[idx + 1];
    }

    function pickBuilderCard(card) {
      const activeField = handBuilderState.activeField;
      if (!activeField) return;

      const duplicateField = manualFieldOrder().find(
        (field) => field !== activeField && handBuilderState.draft[field] === card
      );
      if (duplicateField) {
        handBuilderState.draft[duplicateField] = "";
      }

      handBuilderState.draft[activeField] = card;
      handBuilderState.activeField = nextBuilderField(activeField);
      renderBuilderSlots();
    }

    function clearBuilderActiveSlot() {
      const activeField = handBuilderState.activeField;
      if (!activeField) return;
      handBuilderState.draft[activeField] = "";
      renderBuilderSlots();
    }

    function clearBuilderAllSlots() {
      manualFieldOrder().forEach((field) => {
        handBuilderState.draft[field] = "";
      });
      handBuilderState.activeField = "hand1";
      renderBuilderSlots();
    }

    function autoFillBuilderMissing() {
      const used = new Set(
        manualFieldOrder().map((field) => handBuilderState.draft[field]).filter(Boolean)
      );
      manualFieldOrder().forEach((field) => {
        if (handBuilderState.draft[field]) return;
        const picked = randomAvailableCard(used);
        if (!picked) return;
        handBuilderState.draft[field] = picked;
        used.add(picked);
      });
      renderBuilderSlots();
    }

    function openHandBuilder() {
      handBuilderState.draft = cloneManualValues(state.manual);
      handBuilderState.activeField = firstEmptyManualField(handBuilderState.draft);
      handBuilderState.open = true;
      els.handBuilderModal.classList.add("show");
      els.handBuilderModal.setAttribute("aria-hidden", "false");
      renderBuilderSlots();
    }

    function closeHandBuilder(applyChanges) {
      if (!handBuilderState.open) return;
      if (applyChanges) {
        state.manual = cloneManualValues(handBuilderState.draft);
        renderManualSummary();
      }
      handBuilderState.open = false;
      els.handBuilderModal.classList.remove("show");
      els.handBuilderModal.setAttribute("aria-hidden", "true");
    }

    function initManualBuilder() {
      handBuilderState.draft = cloneManualValues(state.manual);
      handBuilderState.activeField = "hand1";

      buildFullDeck().forEach((card) => {
        const btn = createBuilderDeckButton(card);
        handBuilderState.deckButtons[card] = btn;
        els.builderDeckGrid.appendChild(btn);
      });

      els.builderSlots.forEach((slotBtn) => {
        const field = slotBtn.dataset.builderSlot;
        if (!field) return;
        slotBtn.addEventListener("click", () => setBuilderActiveField(field));
      });

      els.builderCloseBtn.addEventListener("click", () => closeHandBuilder(false));
      els.builderApplyBtn.addEventListener("click", () => closeHandBuilder(true));
      els.builderClearSlotBtn.addEventListener("click", clearBuilderActiveSlot);
      els.builderClearAllBtn.addEventListener("click", clearBuilderAllSlots);
      els.builderAutoFillBtn.addEventListener("click", autoFillBuilderMissing);
      els.handBuilderModal.addEventListener("click", (event) => {
        if (event.target === els.handBuilderModal) {
          closeHandBuilder(false);
        }
      });

      renderManualSummary();
    }

    function bindConfigControls() {
      els.configButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const group = btn.dataset.configGroup;
          const value = btn.dataset.configValue;
          if (!group || !value) return;
          state.config[group] = value;
          renderConfigSelections();
        });
      });
    }

    function renderConfigSelections() {
      els.configButtons.forEach((btn) => {
        const group = btn.dataset.configGroup;
        const value = btn.dataset.configValue;
        const selected = Boolean(group && value && state.config[group] === value);
        btn.classList.toggle("active", selected);
        btn.setAttribute("aria-pressed", selected ? "true" : "false");
      });

      const labels = [state.config.spotType, state.config.position, state.config.role].filter(Boolean);
      els.status.textContent = labels.length ? labels.join(" | ") : "\u00a0";
    }

    function applyLayoutMode(mode) {
      document.body.classList.toggle("layout-compact", mode === "compact");
    }

    function buildFullDeck() {
      const deck = [];
      for (const rank of RANKS) {
        for (const suit of SUITS) {
          deck.push(`${rank}${suit}`);
        }
      }
      return deck;
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function resetDeck(excluded = []) {
      const blocked = new Set(excluded);
      state.deck = buildFullDeck().filter((c) => !blocked.has(c));
      shuffle(state.deck);
    }

    function dealCard() {
      if (!state.deck.length) {
        resetDeck([...state.hand, ...state.board]);
      }
      return state.deck.pop();
    }

    function rankValue(rank) {
      return RANKS.indexOf(rank.toUpperCase()) + 2;
    }

    function isPlayableHand(c1, c2) {
      const r1 = c1[0];
      const s1 = c1[1];
      const r2 = c2[0];
      const s2 = c2[1];
      const v1 = rankValue(r1);
      const v2 = rankValue(r2);

      if (v1 === v2) {
        return true;
      }

      if (s1 === s2) {
        return true;
      }

      const high = Math.max(v1, v2);
      const low = Math.min(v1, v2);
      const gap = high - low - 1;

      if (high >= 12 && low >= 10) return true;
      if (high === 14 && low >= 7) return true;
      if (high === 13 && low >= 9) return true;
      if (high === 12 && low >= 9) return true;
      if (high === 11 && low >= 9) return true;
      if (high >= 10 && low >= 7 && gap <= 2) return true;
      if ((high === 9 && low === 8) || (high === 8 && low === 7)) return true;

      return false;
    }

    function generatePlayableHand() {
      const deck = buildFullDeck();
      while (true) {
        const idx1 = Math.floor(Math.random() * deck.length);
        let idx2 = Math.floor(Math.random() * deck.length);
        while (idx2 === idx1) {
          idx2 = Math.floor(Math.random() * deck.length);
        }

        const c1 = deck[idx1];
        const c2 = deck[idx2];
        if (isPlayableHand(c1, c2)) {
          return [c1, c2].sort((a, b) => rankValue(b[0]) - rankValue(a[0]));
        }
      }
    }

    function randomAvailableCard(excludedSet) {
      const available = buildFullDeck().filter((card) => !excludedSet.has(card));
      if (!available.length) return "";
      const index = Math.floor(Math.random() * available.length);
      return available[index];
    }

    function resolveReplayCards(currentValues, fieldNames, excludedCards, streetLabel) {
      const resolved = currentValues.slice();
      const used = new Set(excludedCards);
      let changed = false;

      for (let i = 0; i < resolved.length; i += 1) {
        const card = resolved[i];
        if (!card) continue;
        if (used.has(card)) {
          resolved[i] = "";
          state.manual[fieldNames[i]] = "";
          changed = true;
          showDuplicateCardWarning(card);
          continue;
        }
        used.add(card);
      }

      const missing = [];
      for (let i = 0; i < resolved.length; i += 1) {
        if (!resolved[i]) missing.push(i);
      }

      if (missing.length) {
        const plural = missing.length > 1 ? "cards" : "card";
        const allowRandom = window.confirm(
          `${streetLabel} is missing ${missing.length} ${plural}. Click OK to add random ${plural}, or Cancel to edit.`
        );
        if (!allowRandom) {
          if (changed) renderManualSummary();
          return null;
        }

        missing.forEach((idx) => {
          const picked = randomAvailableCard(used);
          if (!picked) return;
          resolved[idx] = picked;
          used.add(picked);
          state.manual[fieldNames[idx]] = picked;
          changed = true;
        });
      }

      if (changed) renderManualSummary();
      return resolved;
    }

    function dealHand() {
      stopTimer(true);
      hideTimeOverlay();
      stopTableFlash();

      if (state.mode === "replay") {
        const replayHand = resolveReplayCards(
          [state.manual.hand1, state.manual.hand2],
          ["hand1", "hand2"],
          [],
          "Hero hand"
        );
        if (!replayHand) return;
        state.hand = replayHand;
      } else {
        state.hand = generatePlayableHand();
      }
      state.board = [];
      state.stage = "hand";
      refreshScene();
    }

    function startOver() {
      stopTimer(true);
      hideTimeOverlay();
      stopTableFlash();
      state.hand = [];
      state.board = [];
      state.deck = [];
      state.config.spotType = "";
      state.config.position = "";
      state.config.role = "";
      state.config.stacks = "";
      state.stage = "start";
      renderConfigSelections();
      refreshScene();
    }

    function goBackStreet() {
      hideTimeOverlay();
      stopTableFlash();

      if (state.stage === "done") {
        state.stage = "river";
        refreshScene();
        startTimerForStreet();
        return;
      }

      if (state.stage === "river") {
        state.board = state.board.slice(0, 4);
        state.stage = "turn";
        refreshScene();
        startTimerForStreet();
        return;
      }

      if (state.stage === "turn") {
        state.board = state.board.slice(0, 3);
        state.stage = "flop";
        refreshScene();
        startTimerForStreet();
        return;
      }

      if (state.stage === "flop") {
        stopTimer(true);
        state.board = [];
        state.stage = "hand";
        refreshScene();
        return;
      }

      if (state.stage === "hand") {
        stopTimer(true);
        state.hand = [];
        state.board = [];
        state.deck = [];
        state.stage = "start";
        refreshScene();
      }
    }

    function enterFlop() {
      if (state.hand.length !== 2) return;
      if (state.mode === "replay") {
        const replayFlop = resolveReplayCards(
          [state.manual.flop1, state.manual.flop2, state.manual.flop3],
          ["flop1", "flop2", "flop3"],
          state.hand,
          "Flop"
        );
        if (!replayFlop) return;
        state.board = replayFlop;
      } else {
        resetDeck(state.hand);
        state.board = [dealCard(), dealCard(), dealCard()];
      }
      state.stage = "flop";
      refreshScene();
      startTimerForStreet();

      if (recording.autoStartArmed && recording.mode === "idle") {
        recording.autoStartArmed = false;
        void startRecording({ auto: true });
      }
    }

    function enterTurn() {
      if (state.board.length < 3) return;
      const flop = state.board.slice(0, 3);
      if (state.mode === "replay") {
        const replayTurn = resolveReplayCards(
          [state.manual.turn],
          ["turn"],
          [...state.hand, ...flop],
          "Turn"
        );
        if (!replayTurn) return;
        state.board = [...flop, replayTurn[0]];
      } else {
        resetDeck([...state.hand, ...flop]);
        state.board = [...flop, dealCard()];
      }
      state.stage = "turn";
      refreshScene();
      startTimerForStreet();
    }

    function enterRiver() {
      if (state.board.length < 4) return;
      const four = state.board.slice(0, 4);
      if (state.mode === "replay") {
        const replayRiver = resolveReplayCards(
          [state.manual.river],
          ["river"],
          [...state.hand, ...four],
          "River"
        );
        if (!replayRiver) return;
        state.board = [...four, replayRiver[0]];
      } else {
        resetDeck([...state.hand, ...four]);
        state.board = [...four, dealCard()];
      }
      state.stage = "river";
      refreshScene();
      startTimerForStreet();
    }

    function keepRiver() {
      state.stage = "done";
      stopTimer(true);
      hideTimeOverlay();
      stopTableFlash();
      refreshScene();
    }

    function setCountdownIdle() {
      els.countdown.textContent = "Time left: --:--";
    }

    function updateTimerPauseButton() {
      const onStreet = ["flop", "turn", "river"].includes(state.stage);
      const hasTimer = state.timerChoice !== "None" && state.timeLeft > 0;
      const canToggle = onStreet && hasTimer && !timerPausedByRecording && (Boolean(state.timerId) || state.timerPausedByUser);
      els.timerPauseBtn.disabled = !canToggle;
      els.timerPauseBtn.textContent = state.timerPausedByUser ? "Resume Timer" : "Pause Timer";
    }

    function toggleTimerPause() {
      if (els.timerPauseBtn.disabled) return;
      if (state.timerPausedByUser) {
        state.timerPausedByUser = false;
        startTimerTickLoop();
      } else if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
        state.timerPausedByUser = true;
      }
      updateTimerPauseButton();
    }

    function setRecHint(text) {
      els.recHint.textContent = text;
    }

    function formatElapsed(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const mm = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const ss = String(totalSeconds % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function stopStreamTracks(stream) {
      if (!stream) return;
      stream.getTracks().forEach((track) => track.stop());
    }

    function updateRecordingUi() {
      const isRecording = recording.mode === "recording";
      const isPaused = recording.mode === "paused";

      els.recElapsed.textContent = formatElapsed(recording.elapsedMs);
      els.recDot.classList.remove("idle", "recording", "paused");
      els.recDot.classList.add(isRecording ? "recording" : isPaused ? "paused" : "idle");

      if (isRecording) {
        els.recStateText.textContent = "Recording live";
      } else if (isPaused) {
        els.recStateText.textContent = "Recording paused";
      } else if (recording.mode === "stopping") {
        els.recStateText.textContent = "Finalizing video...";
      } else {
        els.recStateText.textContent = recording.blob ? "Recording ready" : "Recorder idle";
      }

      const canStart = recording.mode === "idle";
      const canPause = recording.mode === "recording";
      const canResume = recording.mode === "paused";
      const canStop = recording.mode === "recording" || recording.mode === "paused";
      const hasClip = Boolean(recording.blob);

      els.recStartBtn.disabled = !canStart;
      els.recPauseBtn.disabled = !canPause;
      els.recResumeBtn.disabled = !canResume;
      els.recStopBtn.disabled = !canStop;
      els.recPlaybackBtn.disabled = !hasClip;
      els.recDownloadBtn.disabled = !hasClip;
    }

    async function initWebcamPreview() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setRecHint("Camera preview unavailable in this browser.");
        return;
      }

      try {
        const camStream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 400 } },
          audio: false
        });
        els.webcamPreview.srcObject = camStream;
        els.webcamPlaceholder.style.display = "none";
      } catch (_err) {
        els.webcamPlaceholder.style.display = "grid";
        setRecHint("Camera permission denied. Recording can still run (screen + mic if available).");
      }
    }

    function getRecorderMimeType() {
      const candidates = [
        "video/webm;codecs=vp9,opus",
        "video/webm;codecs=vp8,opus",
        "video/webm"
      ];
      if (!window.MediaRecorder) return "";
      for (const candidate of candidates) {
        if (MediaRecorder.isTypeSupported(candidate)) return candidate;
      }
      return "";
    }

    function startRecordingClock() {
      if (recording.elapsedIntervalId) {
        clearInterval(recording.elapsedIntervalId);
      }
      recording.elapsedIntervalId = window.setInterval(() => {
        if (recording.mode !== "recording") return;
        recording.elapsedMs += 1000;
        updateRecordingUi();
        if (recording.elapsedMs >= MAX_RECORDING_MS) {
          stopRecording({ reason: "cap" });
        }
      }, 1000);
    }

    function clearRecordingClock() {
      if (!recording.elapsedIntervalId) return;
      clearInterval(recording.elapsedIntervalId);
      recording.elapsedIntervalId = null;
    }

    async function startRecording({ auto }) {
      if (recording.mode !== "idle") return;
      if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        setRecHint("Screen capture is not supported in this browser.");
        return;
      }

      recording.autoStartArmed = false;
      recording.stopReason = "manual";
      recording.elapsedMs = 0;
      recording.chunks = [];
      recording.blob = null;
      if (recording.blobUrl) {
        URL.revokeObjectURL(recording.blobUrl);
        recording.blobUrl = "";
      }
      els.reviewPlayback.removeAttribute("src");
      els.playbackWrap.classList.remove("show");

      let displayStream;
      let micStream = null;
      try {
        displayStream = await navigator.mediaDevices.getDisplayMedia({
          video: { frameRate: 30 },
          audio: false
        });
      } catch (_err) {
        if (auto) {
          setRecHint("Auto-record canceled. Use Start when ready.");
        } else {
          setRecHint("Recording canceled.");
        }
        updateRecordingUi();
        return;
      }

      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (_err) {
        micStream = null;
      }

      const combined = new MediaStream();
      displayStream.getVideoTracks().forEach((track) => combined.addTrack(track));
      if (micStream) {
        micStream.getAudioTracks().forEach((track) => combined.addTrack(track));
      }

      const mimeType = getRecorderMimeType();
      let mediaRecorder;
      try {
        mediaRecorder = mimeType ? new MediaRecorder(combined, { mimeType }) : new MediaRecorder(combined);
      } catch (_err) {
        stopStreamTracks(displayStream);
        stopStreamTracks(micStream);
        setRecHint("Could not start recorder in this browser.");
        updateRecordingUi();
        return;
      }

      recording.mode = "recording";
      recording.mediaRecorder = mediaRecorder;
      recording.displayStream = displayStream;
      recording.micStream = micStream;
      recording.mimeType = mimeType || "video/webm";

      displayStream.getVideoTracks().forEach((track) => {
        track.addEventListener("ended", () => {
          if (recording.mode === "recording" || recording.mode === "paused") {
            stopRecording({ reason: "display-ended" });
          }
        });
      });

      mediaRecorder.addEventListener("dataavailable", (event) => {
        if (event.data && event.data.size > 0) {
          recording.chunks.push(event.data);
        }
      });

      mediaRecorder.addEventListener("stop", () => {
        clearRecordingClock();
        stopStreamTracks(recording.displayStream);
        stopStreamTracks(recording.micStream);
        recording.displayStream = null;
        recording.micStream = null;
        recording.mediaRecorder = null;

        if (recording.chunks.length > 0) {
          recording.blob = new Blob(recording.chunks, { type: recording.mimeType || "video/webm" });
          recording.blobUrl = URL.createObjectURL(recording.blob);
          els.reviewPlayback.src = recording.blobUrl;
          if (recording.stopReason === "cap") {
            setRecHint("Recording stopped at 10:00 cap. Click Download to save.");
          } else if (recording.stopReason === "display-ended") {
            setRecHint("Screen sharing ended. Clip is ready to download.");
          } else {
            setRecHint("Recording stopped. Clip ready for playback/download.");
          }
        } else {
          recording.blob = null;
          setRecHint("No clip data captured. Try recording again.");
        }

        recording.mode = "idle";
        updateRecordingUi();
      });

      mediaRecorder.start(1000);
      startRecordingClock();
      setRecHint(
        micStream
          ? "Recording now. Speak your thought process out loud."
          : "Recording without mic audio (permission denied)."
      );
      updateRecordingUi();
    }

    function pauseStreetTimerForRecording() {
      if (!state.timerId) {
        timerPausedByRecording = false;
        updateTimerPauseButton();
        return;
      }
      clearInterval(state.timerId);
      state.timerId = null;
      timerPausedByRecording = true;
      updateTimerPauseButton();
    }

    function resumeStreetTimerAfterRecordingPause() {
      if (!timerPausedByRecording) return;
      timerPausedByRecording = false;
      if (state.timeLeft > 0 && ["flop", "turn", "river"].includes(state.stage) && !state.timerPausedByUser) {
        startTimerTickLoop();
      }
      updateTimerPauseButton();
    }

    function pauseRecording() {
      if (recording.mode !== "recording" || !recording.mediaRecorder) return;
      try {
        recording.mediaRecorder.pause();
      } catch (_err) {
        return;
      }
      recording.mode = "paused";
      pauseStreetTimerForRecording();
      setRecHint("Recording paused. Drill timer paused too.");
      updateRecordingUi();
    }

    function resumeRecording() {
      if (recording.mode !== "paused" || !recording.mediaRecorder) return;
      try {
        recording.mediaRecorder.resume();
      } catch (_err) {
        return;
      }
      recording.mode = "recording";
      resumeStreetTimerAfterRecordingPause();
      setRecHint("Recording resumed.");
      updateRecordingUi();
    }

    function stopRecording({ reason }) {
      if (recording.mode !== "recording" && recording.mode !== "paused") return;
      recording.stopReason = reason || "manual";
      if (recording.mode === "paused") {
        resumeStreetTimerAfterRecordingPause();
      }
      recording.mode = "stopping";
      updateRecordingUi();
      try {
        recording.mediaRecorder.stop();
      } catch (_err) {
        clearRecordingClock();
        stopStreamTracks(recording.displayStream);
        stopStreamTracks(recording.micStream);
        recording.displayStream = null;
        recording.micStream = null;
        recording.mediaRecorder = null;
        recording.mode = "idle";
        setRecHint("Recorder stopped unexpectedly.");
        updateRecordingUi();
      }
    }

    function togglePlayback() {
      if (!recording.blobUrl) return;
      const nowVisible = els.playbackWrap.classList.toggle("show");
      if (nowVisible) {
        els.reviewPlayback.play().catch(() => {});
      } else {
        els.reviewPlayback.pause();
      }
    }

    function downloadRecording() {
      if (!recording.blob) return;
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      const link = document.createElement("a");
      link.href = recording.blobUrl;
      link.download = `rtp-drillz-session-${stamp}.webm`;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function ensureAudioContext() {
      if (audioContext) {
        if (audioContext.state === "suspended") {
          audioContext.resume().catch(() => {});
        }
        return;
      }
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      try {
        audioContext = new Ctx();
        if (audioContext.state === "suspended") {
          audioContext.resume().catch(() => {});
        }
      } catch (_err) {
        audioContext = null;
      }
    }

    function playTickSound() {
      if (!audioContext) return;
      const t = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = "square";
      osc.frequency.setValueAtTime(920, t);

      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(0.09, t + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);

      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.start(t);
      osc.stop(t + 0.07);
    }

    function updateCountdown() {
      const safe = Math.max(0, state.timeLeft);
      const mm = String(Math.floor(safe / 60)).padStart(2, "0");
      const ss = String(safe % 60).padStart(2, "0");
      els.countdown.textContent = `Time left: ${mm}:${ss}`;
    }

    function startTimerTickLoop() {
      if (state.timerId) return;
      state.timerId = window.setInterval(() => {
        state.timeLeft -= 1;
        updateCountdown();

        if (state.timeLeft > 0 && state.timeLeft <= 5) {
          playTickSound();
        }

        if (state.timeLeft <= 0) {
          stopTimer(false);
          onTimeUp();
        } else {
          updateTimerPauseButton();
        }
      }, 1000);
      updateTimerPauseButton();
    }

    function stopTimer(resetDisplay) {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
      timerPausedByRecording = false;
      state.timerPausedByUser = false;
      if (resetDisplay) {
        setCountdownIdle();
      }
      updateTimerPauseButton();
    }

    function startTimerForStreet() {
      hideTimeOverlay();
      stopTableFlash();
      stopTimer(false);
      timerPausedByRecording = false;
      state.timerPausedByUser = false;

      const seconds = TIMER_MAP[state.timerChoice] || 0;
      if (!seconds) {
        setCountdownIdle();
        updateTimerPauseButton();
        return;
      }

      state.timeLeft = seconds;
      updateCountdown();
      startTimerTickLoop();
      updateTimerPauseButton();
    }

    function showTimeOverlay() {
      els.timeOverlay.classList.add("show");
    }

    function hideTimeOverlay() {
      els.timeOverlay.classList.remove("show");
    }

    function stopTableFlash() {
      if (state.flashId) {
        clearInterval(state.flashId);
        state.flashId = null;
      }
      els.table.classList.remove("flash");
    }

    function flashTable() {
      stopTableFlash();
      let count = 0;
      state.flashId = window.setInterval(() => {
        els.table.classList.toggle("flash");
        count += 1;
        if (count >= 6) {
          stopTableFlash();
        }
      }, 140);
    }

    function onTimeUp() {
      showTimeOverlay();
      flashTable();
    }

    function formatCard(code) {
      if (!code || code.length < 2) return "??";
      return `${code[0].toUpperCase()}${code[1].toLowerCase()}`;
    }

    function cardImageCandidates(code) {
      const rank = code[0].toUpperCase();
      const suit = code[1].toLowerCase();
      const rankVariants = [rank, rank.toLowerCase()];
      const suitVariants = [suit, suit.toUpperCase()];
      if (rank === "T") rankVariants.push("10");

      const out = [];
      for (const prefix of CARD_PREFIXES) {
        for (const r of rankVariants) {
          for (const s of suitVariants) {
            out.push(`${prefix}${r}${s}.png`);
            out.push(`${prefix}${r}_${s}.png`);
          }
        }

        const rankWord = RANK_WORD[rank];
        const suitWord = SUIT_WORD[suit];
        if (rankWord && suitWord) {
          out.push(`${prefix}${rankWord}_of_${suitWord}.png`);
          out.push(`${prefix}${rankWord}_of_${suitWord}2.png`);
        }
      }
      return [...new Set(out)];
    }

    function backImageCandidates() {
      const names = ["back.png", "card_back.png", "cardback.png", "red_back.png", "blue_back.png", "backside.png"];
      const out = [];
      for (const prefix of CARD_PREFIXES) {
        for (const n of names) {
          out.push(`${prefix}${n}`);
        }
      }
      return out;
    }

    function buildGeneratedBackDataUri() {
      const width = 140;
      const height = 200;
      const cell = 20;
      let grid = "";

      for (let y = 0; y < height; y += cell) {
        for (let x = 0; x < width; x += cell) {
          const isOrange = ((x / cell) + (y / cell)) % 2 === 0;
          const fill = isOrange ? "#c85f00" : "#ffffff";
          grid += `<rect x="${x}" y="${y}" width="${cell}" height="${cell}" fill="${fill}"/>`;
        }
      }

      const svg =
        `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">` +
        `<rect x="0" y="0" width="${width}" height="${height}" fill="#ffffff"/>` +
        grid +
        `<rect x="2" y="2" width="${width - 4}" height="${height - 4}" fill="none" stroke="#000000" stroke-width="4"/>` +
        `</svg>`;

      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    function attachImageWithFallback(img, fallbackEl, candidates) {
      let idx = 0;

      function tryNext() {
        if (idx >= candidates.length) {
          img.style.display = "none";
          fallbackEl.style.display = "flex";
          return;
        }
        img.src = candidates[idx];
        idx += 1;
      }

      img.addEventListener("load", () => {
        fallbackEl.style.display = "none";
        img.style.display = "block";
      });

      img.addEventListener("error", tryNext);
      tryNext();
    }

    function createCardElement(cardCode, isBack) {
      const shell = document.createElement("div");
      shell.className = "card-shell";

      const img = document.createElement("img");
      img.className = "card";
      img.alt = isBack ? "Card back" : `Card ${formatCard(cardCode)}`;

      const fallback = document.createElement("div");
      fallback.className = "card-fallback";
      fallback.textContent = isBack ? "BACK" : formatCard(cardCode);

      shell.appendChild(img);
      shell.appendChild(fallback);

      if (isBack && EMBEDDED_CARDS.back) {
        img.src = EMBEDDED_CARDS.back;
        fallback.style.display = "none";
        return shell;
      }

      if (isBack) {
        img.src = GENERATED_BACK_DATA_URI;
        fallback.style.display = "none";
        return shell;
      }

      if (!isBack && cardCode) {
        const key = formatCard(cardCode);
        if (EMBEDDED_CARDS[key]) {
          img.src = EMBEDDED_CARDS[key];
          fallback.style.display = "none";
          return shell;
        }
      }

      const candidates = isBack ? backImageCandidates() : cardImageCandidates(cardCode);
      attachImageWithFallback(img, fallback, candidates);
      return shell;
    }

    function renderBoard() {
      els.boardCards.innerHTML = "";
      if (!state.board.length) {
        const empty = document.createElement("div");
        empty.className = "empty-board";
        empty.textContent = "No board yet";
        els.boardCards.appendChild(empty);
        return;
      }

      state.board.forEach((card) => {
        els.boardCards.appendChild(createCardElement(card, false));
      });
    }

    function renderHand() {
      els.handCards.innerHTML = "";
      if (!state.hand.length) {
        els.handCards.appendChild(createCardElement(null, true));
        els.handCards.appendChild(createCardElement(null, true));
        return;
      }

      state.hand.forEach((card) => {
        els.handCards.appendChild(createCardElement(card, false));
      });
    }

    function setControls(buttons) {
      els.controls.innerHTML = "";
      buttons.forEach(({ text, primary, onClick }) => {
        const btn = document.createElement("button");
        btn.textContent = text;
        if (primary) btn.classList.add("primary");
        btn.addEventListener("click", () => {
          ensureAudioContext();
          onClick();
        });
        els.controls.appendChild(btn);
      });

      if (state.stage !== "start") {
        const backBtn = document.createElement("button");
        backBtn.textContent = "Go Back a Street";
        backBtn.addEventListener("click", () => {
          ensureAudioContext();
          goBackStreet();
        });
        els.controls.appendChild(backBtn);

        const resetBtn = document.createElement("button");
        resetBtn.textContent = "Start Over";
        resetBtn.addEventListener("click", startOver);
        els.controls.appendChild(resetBtn);
      }
    }

    function refreshScene() {
      renderBoard();
      renderHand();

      if (state.stage === "start") {
        els.startSplash.style.display = "block";
        setControls([{ text: "Deal", primary: true, onClick: dealHand }]);
        updateTimerPauseButton();
        renderConfigSelections();
        return;
      }

      els.startSplash.style.display = "none";

      if (state.stage === "hand") {
        setControls([
          { text: "Deal Flop", primary: true, onClick: enterFlop },
          { text: state.mode === "replay" ? "Edit Hand" : "New Hand", primary: false, onClick: dealHand }
        ]);
        updateTimerPauseButton();
        renderConfigSelections();
        return;
      }

      if (state.stage === "flop") {
        setControls([
          { text: "Deal Turn", primary: true, onClick: enterTurn },
          { text: state.mode === "replay" ? "Edit Flop" : "New Flop", primary: false, onClick: enterFlop }
        ]);
        updateTimerPauseButton();
        renderConfigSelections();
        return;
      }

      if (state.stage === "turn") {
        setControls([
          { text: "Deal River", primary: true, onClick: enterRiver },
          { text: state.mode === "replay" ? "Edit Turn" : "New Turn", primary: false, onClick: enterTurn }
        ]);
        updateTimerPauseButton();
        renderConfigSelections();
        return;
      }

      if (state.stage === "river") {
        setControls([
          { text: "Deal", primary: true, onClick: keepRiver },
          { text: state.mode === "replay" ? "Edit River" : "New River", primary: false, onClick: enterRiver }
        ]);
        updateTimerPauseButton();
        renderConfigSelections();
        return;
      }

      if (state.stage === "done") {
        setControls([
          { text: "Deal", primary: true, onClick: dealHand },
          { text: state.mode === "replay" ? "Edit River" : "New River", primary: false, onClick: enterRiver }
        ]);
      }

      updateTimerPauseButton();
      renderConfigSelections();
    }

    init();
  </script>
</body>
</html>
